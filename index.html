<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Smart Student Attendance System</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <!-- Floating Blur Blobs -->
  <div class="blobs">
    <div class="blob blob-1"></div>
    <div class="blob blob-2"></div>
    <div class="blob blob-3"></div>
    <div class="blob blob-4"></div>
  </div>

  <div class="container fade-in">
    <!-- rest of your content (same as before) -->
    <header>
      <h1>📋 Smart Attendance</h1>
      <div class="date-controls">
        <div class="date-picker-wrapper">
          <label for="attendance-date">Select Date:</label>
          <input type="date" id="attendance-date">
          <span id="save-indicator" class="indicator"></span>
        </div>
        <div class="action-buttons">
          <button id="mark-all-btn" class="btn">✅ Mark All Present</button>
          <button id="clear-all-btn" class="btn">❌ Clear All</button>
          <button id="reset-day-btn" class="btn">🔄 Reset Day</button>
        </div>
      </div>
    </header>

    <!-- Import Section -->
    <div class="import-section">
      <button id="show-import-btn" class="btn">📥 Import Students</button>
      <div id="import-panel" class="import-panel hidden">
        <textarea id="student-data-input" placeholder="Paste student data (roll, name) one per line&#10;Example:&#10;101,Alice Johnson&#10;102,Bob Smith" rows="5"></textarea>
        <div class="import-actions">
          <button id="import-btn" class="btn">Load Students</button>
          <button id="cancel-import-btn" class="btn">Cancel</button>
        </div>
      </div>
    </div>

    <main>
      <div id="student-grid" class="student-grid">
        <!-- Student cards will be injected here by JavaScript -->
      </div>
    </main>

    <footer class="summary">
      <div class="percentage-display">
        <div class="progress-ring">
          <div class="progress-ring__circle" id="progress-circle"></div>
        </div>
        <div class="percentage-text">
          <span id="attendance-percentage">0</span>%
        </div>
      </div>
      <div class="stats">
        <span id="present-count">0</span> / <span id="total-students">5</span> Present
      </div>
    </footer>
  </div>

  <script src="script.js"></script>
</body>
</html>
